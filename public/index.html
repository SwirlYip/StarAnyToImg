<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ 星澜智能绘图</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus@2.4.4/dist/index.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    #app { max-width: 1400px; margin: 0 auto; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/vue@3.3.8/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus@2.4.4/dist/index.full.js"></script>
  <script>
    const { createApp, ref, reactive } = Vue

    const app = createApp({
      setup() {
        const form = reactive({
          positive: '',
          negative: '', // 已废弃，由 LLM 生成
          seed: '', // 已废弃，由 LLM 生成
          steps: 20, // 已废弃，由 LLM 生成
          cfg: 5, // 已废弃，由 LLM 生成
          resolution: '1024x1024'
        })

        const generating = ref(false)
        const progress = ref(0)
        const images = ref([])
        const selectedImage = ref(null)
        const previewVisible = ref(false)
        const promptId = ref('')
        const taskStartTime = ref(null)
        const estimatedDuration = ref(180)
        const remainingTimeText = ref('--:--')

        const resetForm = () => {
          form.positive = ''
          // form.resolution 保持不变，用户可能想继续用相同分辨率
          ElementPlus.ElMessage.info('已清空描述')
        }

        const updateRemainingTime = () => {
          if (!generating.value || !estimatedDuration.value || estimatedDuration.value <= 0) {
            remainingTimeText.value = '--:--'
            return
          }
          const elapsed = (Date.now() - taskStartTime.value) / 1000
          const total = estimatedDuration.value
          const remainingSeconds = Math.max(0, Math.ceil(total - elapsed))
          const minutes = Math.floor(remainingSeconds / 60)
          const seconds = remainingSeconds % 60
          remainingTimeText.value = `${minutes}:${seconds.toString().padStart(2, '0')}`
        }

        // 根据分辨率获取默认预估时间（秒）
        const getDefaultEstimatedDuration = (resolution) => {
          const defaults = {
            '512x512': 14,
            '1024x1024': 60,
            '768x1024': 30,
            '1024x768': 30,
            '768x432': 20,
            '1024x576': 25,
            '1920x1080': 90
          }
          return defaults[resolution] || 180
        }

        const generate = async () => {
          if (!form.positive.trim()) {
            ElementPlus.ElMessage.warning('请描述你想生成的图片')
            return
          }

          generating.value = true
          progress.value = 0
          images.value = []
          promptId.value = ''
          taskStartTime.value = Date.now()
          // 立即根据分辨率设置预估时间（避免显示180）
          estimatedDuration.value = getDefaultEstimatedDuration(form.resolution)
          // 后续会被后端返回的实际预估时间覆盖（如有学习数据）
          remainingTimeText.value = '--:--'

          try {
            const payload = {
              description: form.positive, // 用户的自然语言描述
              resolution: form.resolution
              // 其他参数由后端 LLM 自动生成
            }

            const submitResp = await fetch('/api/generate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            })
            const submitData = await submitResp.json()

            if (!submitData.success) {
              throw new Error(submitData.message || '提交失败')
            }

            promptId.value = submitData.prompt_id

            // 显示LLM增强的提示词
            if (submitData.enhanced) {
              console.group('🧠 LLM 增强结果')
              console.log('📝 用户描述:', form.positive)
              console.log('✅ 正向提示词:', submitData.enhanced.positive)
              console.log('🚫 反向提示词:', submitData.enhanced.negative)
              console.log('⚙️  生成参数:', {
                步数: submitData.enhanced.steps,
                CFG: submitData.enhanced.cfg,
                种子: submitData.enhanced.seed
              })
              console.groupEnd()
            }

            // 立即使用后端返回的预估时间
            if (submitData.estimatedDuration) {
              estimatedDuration.value = submitData.estimatedDuration
            }

            let hasShownCompletion = false

            // 轮询状态（1秒一次）
            const pollInterval = setInterval(async () => {
              try {
                const statusResp = await fetch(`/api/status?prompt_id=${promptId.value}`)
                const statusData = await statusResp.json()

                if (!statusData.success) return

                if (statusData.status === 'error') {
                  clearInterval(pollInterval)
                  generating.value = false
                  ElementPlus.ElMessage.error('生成失败：' + (statusData.error || '未知错误'))
                  return
                }

                if (statusData.completed) {
                  if (!hasShownCompletion) {
                    clearInterval(pollInterval)
                    generating.value = false
                    progress.value = 100
                    remainingTimeText.value = '0:00'
                    if (statusData.images && statusData.images.length > 0) {
                      images.value = statusData.images
                      ElementPlus.ElMessage.success(`生成完成！${statusData.images.length}张图片`)
                    } else {
                      ElementPlus.ElMessage.warning('任务完成但未生成图片')
                    }
                    hasShownCompletion = true
                  }
                } else {
                  hasShownCompletion = false
                  if (statusData.estimatedDuration) {
                    estimatedDuration.value = statusData.estimatedDuration
                  }
                  updateRemainingTime()
                }
              } catch (err) {
                console.error('轮询出错:', err.message)
              }
            }, 1000)

            // 平滑动画（每帧更新）
            const animate = () => {
              if (generating.value) {
                const elapsedSeconds = (Date.now() - taskStartTime.value) / 1000
                const target = Math.min((elapsedSeconds / estimatedDuration.value) * 100, 99.99)
                progress.value = Number(target.toFixed(2))
                updateRemainingTime()
                requestAnimationFrame(animate)
              }
            }
            requestAnimationFrame(animate)

          } catch (error) {
            generating.value = false
            ElementPlus.ElMessage.error('请求失败：' + error.message)
          }
        }

        const downloadImage = (img) => {
          const link = document.createElement('a')
          link.href = img.url
          link.download = img.filename
          link.click()
          ElementPlus.ElMessage.success('开始下载')
        }

        const downloadAll = () => {
          images.value.forEach((img, idx) => {
            setTimeout(() => downloadImage(img), idx * 1000)
          })
          ElementPlus.ElMessage.info('已开始批量下载')
        }

        return {
          form,
          generating,
          progress,
          images,
          selectedImage,
          previewVisible,
          promptId,
          resetForm,
          generate,
          downloadImage,
          downloadAll,
          remainingTimeText
        }
      },
      template: `
        <div class="app-container">
          <header class="header">
            <h1>🎨 星澜智能绘图工作台</h1>
            <p class="subtitle">Powered by 星澜智创 · 专业级AI图像生成</p>
          </header>

          <el-row :gutter="24" class="main-content">
            <el-col :xs="24" :sm="24" :md="8" :lg="7">
              <el-card shadow="hover" class="config-card">
                <template #header>
                  <div class="card-header">
                    <span>⚙️ 参数配置</span>
                  </div>
                </template>

                <el-form :model="form" label-width="80px" size="default" :disabled="generating">
                  <el-form-item label="图片描述">
                    <el-input v-model="form.positive" type="textarea" :rows="5" placeholder="描述一下你想生成的图片，是一个怎么样的人物，或者怎么样的美景？" maxlength="1000" show-word-limit />
                  </el-form-item>

                  <el-form-item label="分辨率">
                    <el-select v-model="form.resolution" placeholder="选择分辨率" style="width: 100%">
                      <el-option-group label="1:1">
                        <el-option label="512×512" value="512x512" />
                        <el-option label="1024×1024 (推荐)" value="1024x1024" />
                      </el-option-group>
                      <el-option-group label="4:3">
                        <el-option label="768×1024" value="768x1024" />
                        <el-option label="1024×768" value="1024x768" />
                      </el-option-group>
                      <el-option-group label="16:9">
                        <el-option label="768×432" value="768x432" />
                        <el-option label="1024×576" value="1024x576" />
                        <el-option label="1920×1080" value="1920x1080" />
                      </el-option-group>
                    </el-select>
                  </el-form-item>
                </el-form>

                <div class="actions">
                  <el-button type="primary" :loading="generating" @click="generate" :disabled="generating" style="width: 100%; height: 48px; font-size: 16px;">
                    <span v-if="!generating">✨ 开始生成</span>
                    <span v-else>⏳ 生成中...</span>
                  </el-button>
                  <el-button @click="resetForm" :disabled="generating" style="width: 100%; margin-top: 12px;">🔄 重置参数</el-button>
                </div>
              </el-card>

              <el-card shadow="hover" class="status-card" v-if="generating">
                <template #header><span>📊 生成进度</span></template>
                <el-progress :percentage="progress" />
                <div style="margin-top: 8px; font-size: 12px; color: #666;">
                  预估剩余时间：{{ remainingTimeText }}
                </div>
              </el-card>
            </el-col>

            <el-col :xs="24" :sm="24" :md="16" :lg="17">
              <el-card shadow="hover" class="result-card">
                <template #header>
                  <div class="result-header">
                    <span>🖼️ 生成结果</span>
                    <el-button v-if="images.length > 0" type="primary" size="small" plain @click="downloadAll">⬇️ 批量下载</el-button>
                  </div>
                </template>

                <el-empty v-if="!generating && images.length === 0" description="等待生成..." />

                <div v-else-if="generating" class="loading-container">
                  <div class="loading-animation">
                    <div class="spinner"></div>
                    <p>星澜智能绘图正在生成中，请稍候...</p>
                  </div>
                </div>

                <div v-else class="image-grid">
                  <div v-for="(img, index) in images" :key="index" class="image-item" @click="selectedImage=img; previewVisible=true">
                    <div class="image-wrapper">
                      <img :src="img.url" :alt="img.filename" loading="lazy" />
                      <div class="overlay">
                        <el-button type="primary" size="small" circle @click.stop="downloadImage(img)">⬇️</el-button>
                      </div>
                    </div>
                    <div class="image-meta">
                      <span class="filename">{{ img.filename }}</span>
                      <span class="size">{{ img.width }}×{{ img.height }}</span>
                    </div>
                  </div>
                </div>
              </el-card>

              <el-dialog v-model="previewVisible" :title="selectedImage?.filename" width="80%" destroy-on-close>
                <img :src="selectedImage?.url" style="width: 100%; border-radius: 8px;" />
                <template #footer>
                  <el-button @click="previewVisible = false">关闭</el-button>
                  <el-button type="primary" @click="downloadImage(selectedImage)">下载原图</el-button>
                </template>
              </el-dialog>
            </el-col>
          </el-row>

          <footer class="footer">
            <p>v0.2.260305 · © 星澜智创 · 保留所有权利</p>
          </footer>
        </div>
      `
    }).use(ElementPlus)

    app.mount('#app')
  </script>

  <style scoped>
    .app-container { min-height: 100vh; color: #333; }
    .header { text-align: center; margin-bottom: 24px; color: white; }
    .header h1 { font-size: 28px; margin-bottom: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
    .subtitle { font-size: 14px; opacity: 0.9; }

    .config-card .card-header { display: flex; justify-content: space-between; align-items: center; }
    .actions { margin-top: 24px; }

    .result-card .result-header { display: flex; justify-content: space-between; align-items: center; }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .image-item {
      border: 2px solid transparent;
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .image-item:hover { border-color: #667eea; transform: translateY(-4px); box-shadow: 0 8px 16px rgba(0,0,0,0.15); }

    .image-wrapper { position: relative; padding-top: 100%; overflow: hidden; background: #f5f5f5; }
    .image-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    .overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.3s ease;
    }
    .image-item:hover .overlay { opacity: 1; }

    .image-meta { padding: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #666; background: white; }
    .filename { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .loading-container { display: flex; justify-content: center; align-items: center; min-height: 400px; }
    .loading-animation { text-align: center; }
    .spinner {
      width: 60px; height: 60px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .footer { text-align: center; padding: 20px; color: rgba(255,255,255,0.8); font-size: 14px; }
  </style>
</body>
</html>
